common:
  tags:
    - drivers
    - clock_control
    - ci_tests_zephyr_drivers_clock_control
tests:
  nrf.extended.drivers.clock.nrf_lf_clock_start_xtal_stable.7120:
    platform_allow:
      - nrf7120pdk/nrf7120/cpuapp/emu
    extra_configs:
      - CONFIG_SYSTEM_CLOCK_WAIT_FOR_STABILITY=y
      - CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y

